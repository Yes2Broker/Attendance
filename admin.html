<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yes2Broker | Admin Dashboard</title>

    <link rel="icon" href="Assets/fav.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div class="container">

        <!-- Header -->
        <div class="header">

            <div class="brand">
                <img src="Assets/logo.webp" />
            </div>

            <div class="header-right">

                <div class="date-filter">
                    <select id="monthFilter"></select>
                    <select id="employeeFilter">
                        <option value="">All Employees</option>
                    </select>
                    <select id="advancedFilter">
                        <option value="">All Records</option>
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                        <option value="Paid Leave">Paid Leave</option>
                        <option value="Weekoff">Weekoff</option>
                        <option value="Late">Late</option>
                        <option value="Late Half">Late Half</option>
                        <option value="Short Day">Short Day</option>
                    </select>
                </div>

                <div class="nav-actions">

                    <button onclick="resetFilters()" class="nav-btn secondary">
                        Reset
                    </button>

                    <button onclick="location.href='attendance.html'" class="nav-btn">
                        Add Attendance
                    </button>

                </div>

            </div>
        </div>

        <!-- Summary Cards -->
        <div class="cards">

            <div class="card">
                <h3>Total Month Days</h3>
                <p id="monthDays">0</p>
            </div>

            <div class="card">
                <h3>Present Days</h3>
                <p id="presentCount">0</p>
            </div>

            <div class="card">
                <h3>Weekoff</h3>
                <p id="weekoffCount">0</p>
            </div>

            <div class="card">
                <h3>Weekoff Working</h3>
                <p id="weekoffWorking">0</p>
            </div>

            <div class="card">
                <h3>Paid Leave</h3>
                <p id="paidLeaveCount">0</p>
            </div>

            <div class="card">
                <h3>Unpaid Leave</h3>
                <p id="unpaidLeaveCount">0</p>
            </div>

            <div class="card">
                <h3>Late Coming</h3>
                <p id="lateCount">0</p>
            </div>

            <div class="card">
                <h3>Late Deduction</h3>
                <p id="lateDeduction">0</p>
            </div>

            <div class="card">
                <h3>Short Working Days</h3>
                <p id="shortWorking">0</p>
            </div>

            <div class="card">
                <h3>Net Payable Days</h3>
                <p id="netPayableDays">0</p>
            </div>

            <div class="card">
                <h3>Final Salary</h3>
                <p id="finalSalary">0</p>
            </div>

        </div>

        <!-- Attendance Table -->
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Employee</th>
                        <th>In</th>
                        <th>Out</th>
                        <th>Hours</th>
                        <th>Status</th>
                        <th>Half</th>
                        <th>Late</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="8">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="script.js"></script>
</body>


</html>
